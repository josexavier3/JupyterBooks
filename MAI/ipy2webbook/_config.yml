#######################################################################################
# Book settings — https://jupyterbook.org/customize/config.html
title: Mecânica Aplicada I
author: José Xavier
copyright: "José Xavier · DEMI · NOVA FCT"

# Only build pages listed in _toc.yml (ignore backups, the venv, helper scripts).
only_build_toc_files: true
exclude_patterns:
  - .venv-jb
  - _orig_backup
  - gen_au.py
  - README.md

# Pages are Markdown that link out to Google Colab — there is nothing to execute.
execute:
  execute_notebooks: "off"

# MyST Markdown features used by the pages
parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify

# HTML output (sphinx-book-theme: the light/dark/auto toggle is built in)
html:
  favicon: logo-demi-dark.jpg
  use_issues_button: false
  use_repository_button: false
  baseurl: "https://userweb.fct.unl.pt/~jmc.xavier/MAI/"

sphinx:
  config:
    html_static_path:
      - _static
    html_css_files:
      - custom.css
    html_js_files:
      - custom.js
    language: pt
    html_last_updated_fmt: "%d/%m/%Y"
    html_theme_options:
      # Per-mode DEMI logo: positive (dark-on-white) in light mode,
      # negative (white-on-dark) in dark mode.
      logo:
        image_light: logo-demi-light.jpg
        image_dark: logo-demi-dark.jpg
        alt_text: "DEMI · NOVA FCT"
        link: "../"          # logótipo aponta para o índice principal (umbrella)
      show_navbar_depth: 1
      show_toc_level: 2
      use_fullscreen_button: true
      use_download_button: false
      navigation_with_keys: true
